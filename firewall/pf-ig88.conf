# IG88 LLM proxy firewall rules
# Load with: sudo pfctl -f /etc/pf.conf (after including this file)

# Allow only trusted ingress nodes to reach the proxy port.

table <ig88_allowed> { 10.20.0.200, 10.20.0.210, 10.0.0.0/24 }

pass in proto tcp from <ig88_allowed> to any port 11434
block in proto tcp to any port 11434
